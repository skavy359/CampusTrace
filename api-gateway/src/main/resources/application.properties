spring.application.name=api-gateway
server.port=8080

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=false
eureka.instance.hostname=localhost

# Actuator
management.endpoints.web.exposure.include=health,info,mappings
management.endpoint.health.show-details=always
info.app.name=API Gateway
info.app.description=Single entry point for Campus Lost and Found Portal
info.app.version=1.0.0

# Gateway Routes - User Service
spring.cloud.gateway.server.webmvc.routes[0].id=user-service-auth
spring.cloud.gateway.server.webmvc.routes[0].uri=lb://USER-SERVICE
spring.cloud.gateway.server.webmvc.routes[0].predicates[0]=Path=/api/auth/**

spring.cloud.gateway.server.webmvc.routes[1].id=user-service-users
spring.cloud.gateway.server.webmvc.routes[1].uri=lb://USER-SERVICE
spring.cloud.gateway.server.webmvc.routes[1].predicates[0]=Path=/api/users/**

# Gateway Routes - Lost Item Service
spring.cloud.gateway.server.webmvc.routes[2].id=lost-item-service
spring.cloud.gateway.server.webmvc.routes[2].uri=lb://LOST-ITEM-SERVICE
spring.cloud.gateway.server.webmvc.routes[2].predicates[0]=Path=/api/lost-items/**

# Gateway Routes - Found Item Service
spring.cloud.gateway.server.webmvc.routes[3].id=found-item-service
spring.cloud.gateway.server.webmvc.routes[3].uri=lb://FOUND-ITEM-SERVICE
spring.cloud.gateway.server.webmvc.routes[3].predicates[0]=Path=/api/found-items/**

# Gateway Routes - Claim Service
spring.cloud.gateway.server.webmvc.routes[4].id=claim-service
spring.cloud.gateway.server.webmvc.routes[4].uri=lb://CLAIM-SERVICE
spring.cloud.gateway.server.webmvc.routes[4].predicates[0]=Path=/api/claims/**

# Gateway Routes - Notification Service
spring.cloud.gateway.server.webmvc.routes[5].id=notification-service
spring.cloud.gateway.server.webmvc.routes[5].uri=lb://NOTIFICATION-SERVICE
spring.cloud.gateway.server.webmvc.routes[5].predicates[0]=Path=/api/notifications/**

# Thymeleaf
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.cache=false
