<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Report Found Item - Campus Lost &amp; Found</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-layout">
        <nav class="sidebar">
            <div class="sidebar-brand"><h2>🔍 CampusTrace</h2><span>Lost &amp; Found Portal</span></div>
            <div class="sidebar-nav">
                <a href="/dashboard" class="nav-item" data-page="/dashboard"><span class="icon">📊</span> Dashboard</a>
                <a href="/lost-items" class="nav-item" data-page="/lost-items"><span class="icon">🔍</span> Lost Items</a>
                <a href="/found-items" class="nav-item" data-page="/found-items"><span class="icon">📦</span> Found Items</a>
                <a href="/add-lost-item" class="nav-item" data-page="/add-lost-item"><span class="icon">➕</span> Report Lost</a>
                <a href="/add-found-item" class="nav-item active" data-page="/add-found-item"><span class="icon">📥</span> Report Found</a>
                <div class="nav-divider"></div>
                <a href="/claim-item" class="nav-item" data-page="/claim-item"><span class="icon">🏷️</span> Claim Item</a>
                <a href="/notifications" class="nav-item" data-page="/notifications"><span class="icon">🔔</span> Notifications <span class="nav-badge" id="notifBadge" style="display:none;">0</span></a>
                <div class="nav-divider"></div>
                <a href="/admin" class="nav-item" id="adminNav" data-page="/admin" style="display:none;"><span class="icon">⚙️</span> Admin Panel</a>
            </div>
            <div class="sidebar-footer">
                <div class="user-info"><div class="user-avatar" id="sidebarUserAvatar">U</div><div><div class="user-name" id="sidebarUserName">User</div><div class="user-role" id="sidebarUserRole">STUDENT</div></div></div>
                <button class="btn btn-secondary btn-sm" onclick="Auth.logout()" style="width:100%;">Logout</button>
            </div>
        </nav>
        <main class="main-content">
            <div class="form-page">
                <div class="page-header"><h1>Report Found Item</h1></div>
                <div class="card">
                    <h2>Item Details</h2>
                    <form onsubmit="handleAddFoundItem(event)">
                        <div class="form-group">
                            <label for="itemName">Item Name *</label>
                            <input type="text" id="itemName" placeholder="e.g., Black Umbrella" required>
                        </div>
                        <div class="form-group">
                            <label for="description">Description</label>
                            <textarea id="description" placeholder="Describe the item in detail..."></textarea>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label for="category">Category</label>
                                <select id="category">
                                    <option value="">Select category</option>
                                    <option value="Electronics">Electronics</option>
                                    <option value="Books">Books</option>
                                    <option value="Clothing">Clothing</option>
                                    <option value="Accessories">Accessories</option>
                                    <option value="Documents">Documents</option>
                                    <option value="Keys">Keys</option>
                                    <option value="Wallet">Wallet</option>
                                    <option value="Other">Other</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="dateFound">Date Found</label>
                                <input type="date" id="dateFound">
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="locationFound">Where Found</label>
                            <input type="text" id="locationFound" placeholder="e.g., Cafeteria Table 5">
                        </div>
                        <div class="form-group">
                            <label for="contactInfo">Contact Info</label>
                            <input type="text" id="contactInfo" placeholder="Phone or email">
                        </div>
                        <button type="submit" class="btn btn-success">Submit Report</button>
                    </form>
                </div>
            </div>
        </main>
    </div>
    <script th:src="@{/js/app.js}"></script>
    <script>checkAuth(); updateSidebar();</script>
</body>
</html>
