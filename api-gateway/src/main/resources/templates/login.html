<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Campus Lost and Found Portal - Login">
    <title>Login - Campus Lost &amp; Found</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="logo">🔍</div>
            <h1>Campus Lost &amp; Found</h1>
            <p class="subtitle">Sign in to your account</p>

            <form onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" placeholder="Enter your username" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter your password" required>
                </div>
                <button type="submit" class="btn btn-primary">Sign In</button>
            </form>

            <p style="text-align:center;margin-top:20px;color:var(--text-secondary);font-size:0.9rem;">
                Don't have an account? <a href="/register">Create one</a>
            </p>
        </div>
    </div>

    <script th:src="@{/js/app.js}"></script>
</body>
</html>
