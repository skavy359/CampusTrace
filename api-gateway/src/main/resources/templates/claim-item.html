<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claim Item - Campus Lost &amp; Found</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-layout">
        <nav class="sidebar">
            <div class="sidebar-brand"><h2>🔍 CampusTrace</h2><span>Lost &amp; Found Portal</span></div>
            <div class="sidebar-nav">
                <a href="/dashboard" class="nav-item" data-page="/dashboard"><span class="icon">📊</span> Dashboard</a>
                <a href="/lost-items" class="nav-item" data-page="/lost-items"><span class="icon">🔍</span> Lost Items</a>
                <a href="/found-items" class="nav-item" data-page="/found-items"><span class="icon">📦</span> Found Items</a>
                <a href="/add-lost-item" class="nav-item" data-page="/add-lost-item"><span class="icon">➕</span> Report Lost</a>
                <a href="/add-found-item" class="nav-item" data-page="/add-found-item"><span class="icon">📥</span> Report Found</a>
                <div class="nav-divider"></div>
                <a href="/claim-item" class="nav-item active" data-page="/claim-item"><span class="icon">🏷️</span> Claim Item</a>
                <a href="/notifications" class="nav-item" data-page="/notifications"><span class="icon">🔔</span> Notifications <span class="nav-badge" id="notifBadge" style="display:none;">0</span></a>
                <div class="nav-divider"></div>
                <a href="/admin" class="nav-item" id="adminNav" data-page="/admin" style="display:none;"><span class="icon">⚙️</span> Admin Panel</a>
            </div>
            <div class="sidebar-footer">
                <div class="user-info"><div class="user-avatar" id="sidebarUserAvatar">U</div><div><div class="user-name" id="sidebarUserName">User</div><div class="user-role" id="sidebarUserRole">STUDENT</div></div></div>
                <button class="btn btn-secondary btn-sm" onclick="Auth.logout()" style="width:100%;">Logout</button>
            </div>
        </nav>
        <main class="main-content">
            <div class="form-page">
                <div class="page-header"><h1>Submit Ownership Claim</h1></div>
                <div class="card">
                    <h2>Claim Details</h2>
                    <form onsubmit="handleSubmitClaim(event)">
                        <div class="form-row">
                            <div class="form-group">
                                <label for="itemId">Item ID *</label>
                                <input type="number" id="itemId" placeholder="Item number" required>
                            </div>
                            <div class="form-group">
                                <label for="itemType">Item Type *</label>
                                <select id="itemType" required>
                                    <option value="LOST">Lost Item</option>
                                    <option value="FOUND">Found Item</option>
                                </select>
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="description">Description of Claim</label>
                            <textarea id="description" placeholder="Describe why you believe this item is yours..."></textarea>
                        </div>
                        <div class="form-group">
                            <label for="proofOfOwnership">Proof of Ownership</label>
                            <textarea id="proofOfOwnership" placeholder="Provide any proof that this item belongs to you (serial numbers, photos description, unique marks, etc.)"></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary">Submit Claim</button>
                    </form>
                </div>
            </div>
        </main>
    </div>
    <script th:src="@{/js/app.js}"></script>
    <script>prefillClaimForm();</script>
</body>
</html>
